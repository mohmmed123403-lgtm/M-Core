<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Core Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma; }
        body { background: #0d1117; color: #c9d1d9; height: 100vh; overflow: hidden; }

        /* Header */
       .header { background: #161b22; padding: 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #30363d; }
       .logo { font-weight: 900; color: #58a6ff; font-size: 20px; }
       .search-box { flex: 1; display: flex; background: #0d1117; border: 1px solid #30363d; border-radius: 20px; overflow: hidden; }
       .search-box input { flex: 1; background: transparent; border: none; padding: 12px 16px; color: #c9d1d9; outline: none; font-size: 15px; }
       .search-box button { background: #238636; border: none; color: white; padding: 0 18px; cursor: pointer; font-weight: bold; }
       .menu-btn { background: transparent; border: none; color: #c9d1d9; font-size: 26px; cursor: pointer; padding: 0 10px; }

        /* Frame */
        #frame { width: 100%; height: calc(100vh - 118px); border: none; background: #0d1117; }

        /* History Bar */
       .history { background: #161b22; height: 58px; overflow-x: auto; white-space: nowrap; padding: 8px; border-top: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
       .history-label { opacity: 0.6; font-size: 13px; margin-left: 5px; }
       .history-item { display: inline-block; background: #21262d; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; border: 1px solid #30363d; }
       .history-item:hover { background: #30363d; border-color: #58a6ff; }
       .clear-history { background: #da3633; border: none; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; margin-right: auto; }

        /* Settings Modal */
       .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(5px); }
       .modal-content { background: #161b22; margin: 60px auto; padding: 0; width: 90%; max-width: 420px; border-radius: 16px; border: 1px solid #30363d; overflow: hidden; }
       .modal-header { background: #0d1117; padding: 18px 20px; border-bottom: 1px solid #30363d; }
       .modal-header h2 { color: #58a6ff; font-size: 20px; }
       .modal-body { padding: 10px 20px; max-height: 60vh; overflow-y: auto; }
       .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #21262d; }
       .setting-info { flex: 1; }
       .setting-title { font-weight: 600; margin-bottom: 4px; }
       .setting-desc { font-size: 12px; opacity: 0.6; }
       .switch { position: relative; width: 52px; height: 28px; }
